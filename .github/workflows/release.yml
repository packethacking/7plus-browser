name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Opt JS-based actions into the Node.js 24 runtime (the v4/v2 action tags above
# still ship with a Node 20 shim, which GitHub deprecated on 2025-09-19 and will
# remove from runners on 2026-09-16). This override can come out once the
# upstream actions publish Node-24 releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so we can see existing tags

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Determine version from package.json
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Name the single-file build
        if: steps.ver.outputs.release == 'true'
        run: cp dist/index.html "7plus-browser-${{ steps.ver.outputs.tag }}.html"

      - name: Create GitHub release
        if: steps.ver.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            Automated build from commit ${{ github.sha }}.

            The build is a single self-contained HTML file — JS and CSS are inlined. Drop it on any static host, open it with `file://`, serve it from a USB stick, email it to a friend. No sibling assets to deploy alongside.

            - `7plus-browser-${{ steps.ver.outputs.tag }}.html`
          files: |
            7plus-browser-${{ steps.ver.outputs.tag }}.html
